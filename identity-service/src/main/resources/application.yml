spring:
  application:
    name: identity-service
  datasource:
    jdbc-url: ${SPRING_DATASOURCE_JDBC_URL:jdbc:mysql://localhost:3306/identity_db?createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# Subscription Database Configuration
subscription:
  datasource:
    jdbc-url: ${SUBSCRIPTION_DATASOURCE_JDBC_URL:jdbc:mysql://localhost:3306/subscription_db?createDatabaseIfNotExist=true}
    username: ${SUBSCRIPTION_DATASOURCE_USERNAME:root}
    password: ${SUBSCRIPTION_DATASOURCE_PASSWORD:1234}
    driver-class-name: ${SUBSCRIPTION_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

server:
  port: 8088

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# JWT Configuration
jwt:
  secret: "5367566B59703373367639792F423F4528482B4D6251655468576D5A7134743777217A25432A462D4A614E645267556B58703272357538782F413F4428472B4B"
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# CORS Configuration
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  exposed-headers: Authorization
  allow-credentials: true

logging:
  level:
    com.inventory: DEBUG
    org.springframework.security: DEBUG

