    restart: unless-stopped

  notification-service:
    image: ${DOCKER_USERNAME}/notification-service:middeniya
    container_name: middeniya-notification-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/notification_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=knoweb_admin_2026
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    depends_on:
      - mysql
      - service-discovery
    networks:
      - app-network
    restart: unless-stopped

  catalog-service:
    image: ${DOCKER_USERNAME}/catalog-service:middeniya
    container_name: middeniya-catalog-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/catalog_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=knoweb_admin_2026
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
    depends_on:
      - mysql
