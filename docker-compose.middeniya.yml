      - app-network
    restart: unless-stopped

  inventory-frontend:
    image: ${DOCKER_USERNAME}/inventory-frontend:middeniya
    container_name: middeniya-inventory-frontend
    ports:
      - "3002:80"
    depends_on:
      - api-gateway
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
