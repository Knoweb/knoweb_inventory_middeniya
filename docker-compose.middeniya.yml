      - SPRING_DATASOURCE_PASSWORD=knoweb_admin_2026
      - SUBSCRIPTION_DATASOURCE_JDBC_URL=jdbc:mysql://mysql:3306/subscription_db?createDatabaseIfNotExist=true
      - SUBSCRIPTION_DATASOURCE_USERNAME=root
      - SUBSCRIPTION_DATASOURCE_PASSWORD=knoweb_admin_2026
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
