    restart: unless-stopped

  reporting-service:
    image: ${DOCKER_USERNAME}/reporting-service:middeniya
    container_name: middeniya-reporting-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/reporting_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=knoweb_admin_2026
