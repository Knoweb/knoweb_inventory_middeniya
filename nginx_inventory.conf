# Add this inside your 'server' block in /etc/nginx/sites-available/default

# 1. Inventory Frontend
location /inventory {
    alias /var/www/inventory/dist; # This should be your build folder path on server
    index index.html;
    try_files $uri $uri/ /inventory/index.html;
}

# 2. Inventory API Gateway Proxy
location /inventory-api/ {
    proxy_pass http://localhost:9080/; # API Gateway running on port 9080
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
