name: CI/CD - Middeniya Inventory System

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - service-discovery
          - product-service
          - inventory-service
          - order-service
          - warehouse-service
          - supplier-service
          - user-service
          - notification-service
          - catalog-service
          - reporting-service
          - inventory-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        if: matrix.service != 'inventory-frontend'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build backend service with Maven
        if: matrix.service != 'inventory-frontend'
        working-directory: ./${{ matrix.service }}
        run: mvn -B -DskipTests package

      - name: Set up Node 18
        if: matrix.service == 'inventory-frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend (inventory-frontend)
        if: matrix.service == 'inventory-frontend'
        working-directory: ./inventory-frontend
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}:middeniya

  deploy-to-digitalocean:
    name: Deploy to DigitalOcean Droplet
    runs-on: ubuntu-latest
    needs: build-and-push-images
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose file to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          source: "docker-compose.middeniya.yml"
          target: ${{ secrets.DO_APP_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DO_APP_PATH }}
            export DOCKER_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker-compose -f docker-compose.middeniya.yml pull
            docker-compose -f docker-compose.middeniya.yml up -d --remove-orphans
